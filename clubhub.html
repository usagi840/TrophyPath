<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClubHub - Chat de club Brawl Stars</title>
<meta name="description" content="Vérifie ton compte Brawl Stars et discute en direct avec les membres de ton club.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,600;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f6f5f0;
  --bg2:#eeede7;
  --bg3:#e4e3dc;
  --card:#ffffff;
  --border:#e0dfd8;
  --text:#18180f;
  --text2:#72716a;
  --text3:#b0afa8;
  --accent:#ff5c35;
  --accent2:#e04820;
  --accentbg:#fff3f0;
  --blue:#3b6ef0;
  --green:#2cb67d;
  --red:#e84040;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 2px 8px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.04);
  --r:14px;
}

html,body{min-height:100%;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);background:var(--bg)}
body{display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
button,input{font-family:'Outfit',sans-serif}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;height:58px;
  background:rgba(255,255,255,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.brand{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;
  color:var(--text);letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.brand span{color:var(--accent);font-style:italic}

.tbtn.accent{padding:9px 16px;border-radius:10px;border:none;background:var(--accent);
  color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px}
.tbtn.accent:hover{background:var(--accent2);transform:translateY(-1px)}

/* ── LAYOUT ── */
.main{display:flex;justify-content:center;padding:20px 12px 90px;
  max-width:620px;margin:0 auto;width:100%;flex:1}

/* ── EMPTY / GATE STATE (pas encore vérifié) ── */
.empty{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  padding:48px 24px;text-align:center;border:1px solid var(--border);width:100%;align-self:flex-start}
.empty .em-ico{font-size:2.4rem;margin-bottom:12px}
.empty h3{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:600;margin-bottom:6px}
.empty p{font-size:.85rem;color:var(--text2);margin-bottom:18px;line-height:1.5}

/* ── PROFIL VÉRIFIÉ ── */
.profile-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid var(--border);width:100%;overflow:hidden}
.profile-head{display:flex;align-items:center;gap:14px;padding:20px}
.profile-ico{width:56px;height:56px;border-radius:14px;background:var(--accentbg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.5rem}
.profile-info{flex:1;min-width:0}
.profile-info .pname{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600}
.profile-info .psub{font-size:.8rem;color:var(--text2);margin-top:2px}
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accentbg);
  color:var(--accent);font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:6px}

.club-open-btn{display:block;width:calc(100% - 32px);margin:0 16px 20px;padding:13px;
  background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.club-open-btn:hover{background:var(--accent2)}

/* ── CLUB SCREEN (plein écran mobile, panneau à droite sur desktop) ── */
.club-screen{position:fixed;inset:0;z-index:850;background:var(--card);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1)}
.club-screen.open{transform:translateX(0)}
@media(min-width:760px){
  .club-screen{left:auto;width:420px;box-shadow:-8px 0 32px rgba(0,0,0,.14)}
}
.club-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.club-back{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:1rem;color:var(--text);flex-shrink:0}
.club-head .cico{width:38px;height:38px;border-radius:10px;background:var(--accentbg);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.club-head .cinfo{flex:1;min-width:0}
.club-head .cname{font-family:'Fraunces',serif;font-weight:600;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.club-head .csub{font-size:.72rem;color:var(--text2)}

.club-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.club-empty{text-align:center;color:var(--text3);font-size:.82rem;margin-top:30px;line-height:1.6}

.msg-row{display:flex;flex-direction:column;max-width:78%}
.msg-row.me{align-self:flex-end;align-items:flex-end}
.msg-row.other{align-self:flex-start;align-items:flex-start}
.msg-author{font-size:.7rem;color:var(--text3);margin-bottom:2px;padding:0 4px}
.msg-bubble{border-radius:14px;padding:9px 13px;font-size:.87rem;line-height:1.4;word-break:break-word}
.msg-row.me .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-row.other .msg-bubble{background:var(--card);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-bubble.media{padding:4px}
.msg-bubble img,.msg-bubble video{max-width:220px;max-height:260px;border-radius:10px;display:block;cursor:pointer}
.msg-time{font-size:.65rem;color:var(--text3);margin-top:2px;padding:0 4px}

.club-input-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--card)}
.club-attach{width:38px;height:38px;border-radius:50%;border:none;background:var(--bg);
  font-size:1.1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.club-input-bar input[type=text]{flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:20px;padding:9px 15px;font-size:.87rem;outline:none}
.club-input-bar input[type=text]:focus{border-color:var(--accent)}
.club-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);
  color:#fff;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.club-send:hover{background:var(--accent2)}
.upload-progress{font-size:.72rem;color:var(--text2);padding:0 12px 8px;text-align:center}

/* ── VÉRIFICATION (assistant en 3 étapes) ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.inp{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 14px;font-size:.95rem;color:var(--text);outline:none;width:100%;transition:all .2s}
.inp:focus{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 4px rgba(255,92,53,.08)}
.inp::placeholder{color:var(--text3)}

.btn-main{width:100%;padding:13px;background:var(--accent);color:white;border:none;
  border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-main:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-main:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-ghost-sm{width:100%;padding:10px;margin-top:10px;background:none;border:1.5px solid var(--border);
  border-radius:10px;color:var(--text2);font-size:.82rem;cursor:pointer}

.err-box{font-size:.8rem;color:var(--red);margin-top:6px;min-height:16px;text-align:center}

.verify-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
  border:1px solid var(--border);padding:24px;width:100%}
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
.step-dots span{width:7px;height:7px;border-radius:50%;background:var(--border)}
.step-dots span.on{background:var(--accent)}

.icon-box{background:var(--accentbg);border:2px solid var(--accent);border-radius:16px;padding:24px;text-align:center;margin-bottom:14px}
.icon-box img{width:80px;height:80px;object-fit:contain;margin:0 auto 12px;display:block}
.icon-label{font-size:.72rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.icon-code{font-size:1.3rem;font-weight:700;color:var(--text);font-family:'Fraunces',serif}
.info-box{background:var(--bg);border-radius:12px;padding:14px;border:1px solid var(--border);font-size:.82rem;color:var(--text2);line-height:1.6}

.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:#fff;padding:11px 20px;border-radius:10px;font-size:.85rem;
  font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:1000;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Club<span>Hub</span></div>
</div>

<div class="main" id="main"></div>

<!-- CLUB SCREEN -->
<div class="club-screen" id="club-screen">
  <div class="club-head">
    <button class="club-back" id="club-back">←</button>
    <div class="cico">🛡️</div>
    <div class="cinfo">
      <div class="cname" id="club-name-lbl">Mon club</div>
      <div class="csub" id="club-sub-lbl">Chat privé du club</div>
    </div>
  </div>
  <div class="club-msgs" id="club-msgs">
    <div class="club-empty">Chargement des messages…</div>
  </div>
  <div class="upload-progress" id="upload-progress" style="display:none"></div>
  <div class="club-input-bar">
    <input type="file" id="club-file-inp" accept="image/*,video/*" style="display:none"/>
    <button class="club-attach" id="club-attach-btn" title="Envoyer une photo/vidéo">📎</button>
    <input type="text" id="club-text-inp" placeholder="Écrire un message…" maxlength="500"/>
    <button class="club-send" id="club-send-btn">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, query, limitToLast, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* Même projet Firebase que Tark, mais nouvelle branche isolée "clubhub_clubs"
   pour ne jamais toucher à l'arborescence "spk3" utilisée par Tark. */
const app = initializeApp({
  apiKey:"AIzaSyC-AOmgQO3sNpAEWk43TbkBczBiasI80WQ",
  authDomain:"bark-afa26.firebaseapp.com",
  databaseURL:"https://bark-afa26-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"bark-afa26",
  storageBucket:"bark-afa26.firebasestorage.app",
});
const db = getDatabase(app);
const storage = getStorage(app);
const CLUB_ROOT = 'clubhub_clubs';
const WORKER_URL = 'https://tark.alex-usagi84.workers.dev/?tag=';

function cleanTag(tag){ return (tag||'').replace(/^#/,'').toUpperCase().trim(); }

async function fetchBsPlayer(tag){
  const clean = cleanTag(tag);
  const res = await fetch(WORKER_URL+encodeURIComponent(clean));
  if(!res.ok) throw new Error('Joueur introuvable');
  const data = await res.json();
  if(data.error) throw new Error('Joueur introuvable');
  return data;
}

function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(toast._tm);
  toast._tm=setTimeout(()=>t.classList.remove('show'),2600);
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }

/* ══════════════ IDENTITÉ / VÉRIFICATION ══════════════ */
const IDENTITY_KEY = 'clubhub_identity';
function loadIdentity(){ try{ return JSON.parse(localStorage.getItem(IDENTITY_KEY)); }catch(e){ return null; } }
function saveIdentity(id){ localStorage.setItem(IDENTITY_KEY, JSON.stringify(id)); }
let identity = loadIdentity();

const BS_ICONS_POOL = [28000000,28000001,28000002,28000003,28000004,28000005,28000006,28000007,28000008,28000009,28000010,28000011,28000012,28000013,28000014,28000015,28000016,28000017,28000018,28000019,28000020,28000021,28000022,28000023,28000024,28000025,28000026,28000027,28000028,28000029,28000030];
function pickRandomIcon(exclude=[]){
  const pool = BS_ICONS_POOL.filter(id=>!exclude.includes(id));
  return pool[Math.floor(Math.random()*pool.length)];
}

let verifyState = { step:1, tag:'', iconBefore:null, targetIcon1:null, targetIcon2:null };

/* ══════════════ RENDER PRINCIPAL ══════════════ */
function renderMain(){
  const main = document.getElementById('main');
  if(!identity?.verified){
    main.innerHTML = `<div class="verify-card" id="verify-card"></div>`;
    renderVerifyStep();
    return;
  }
  if(!identity.clubTag){
    main.innerHTML = `
      <div class="empty">
        <div class="em-ico">🛡️</div>
        <h3>Aucun club pour l'instant</h3>
        <p>Ton compte <b>${escapeHtml(identity.name)}</b> est vérifié, mais tu n'es dans aucun club Brawl Stars actuellement.</p>
        <button class="tbtn accent" id="btn-refresh-identity">Actualiser mon statut</button>
      </div>`;
    document.getElementById('btn-refresh-identity').onclick = refreshIdentityClub;
    return;
  }
  main.innerHTML = `
    <div class="profile-card">
      <div class="profile-head">
        <div class="profile-ico">🏆</div>
        <div class="profile-info">
          <div class="pname">${escapeHtml(identity.name)}</div>
          <div class="psub">${escapeHtml(identity.clubName)}</div>
          <span class="verified-badge">✓ Vérifié</span>
        </div>
      </div>
      <button class="club-open-btn" id="btn-open-club">💬 Ouvrir le chat du club</button>
    </div>`;
  document.getElementById('btn-open-club').onclick = openClubScreen;
}

async function refreshIdentityClub(){
  try{
    const player = await fetchBsPlayer(identity.tag);
    identity.clubTag = player.club?.tag || null;
    identity.clubName = player.club?.name || null;
    saveIdentity(identity);
    renderMain();
  }catch(e){ toast('Erreur réseau','err'); }
}

/* ══════════════ VÉRIFICATION (3 étapes) ══════════════ */
function renderVerifyStep(){
  const card = document.getElementById('verify-card');
  if(!card) return;

  if(verifyState.step===1){
    card.innerHTML = `
      <div class="step-dots"><span class="on"></span><span></span><span></span></div>
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-family:'Fraunces',serif;font-size:1.25rem;font-weight:600;margin-bottom:6px">Vérifie ton compte Brawl Stars</div>
        <div style="font-size:.85rem;color:var(--text2)">Confirme que ce compte t'appartient pour accéder au chat de ton club</div>
      </div>
      <div class="field">
        <label>Ton tag Brawl Stars</label>
        <input id="verify-tag-inp" class="inp" placeholder="#1234ABCD" value="${verifyState.tag}" style="text-transform:uppercase;text-align:center;font-weight:600;letter-spacing:1px"/>
      </div>
      <div class="err-box" id="verify-err"></div>
      <button class="btn-main" id="verify-next">Continuer →</button>`;
    document.getElementById('verify-next').onclick = async ()=>{
      const btn = document.getElementById('verify-next');
      const err = document.getElementById('verify-err');
      const tag = cleanTag(document.getElementById('verify-tag-inp').value);
      err.textContent='';
      if(!tag || tag.length<3){ err.textContent='Identifiant invalide'; return; }
      btn.disabled=true; btn.innerHTML=`<span class="loader"></span>Recherche…`;
      try{
        const player = await fetchBsPlayer(tag);
        verifyState.tag = tag;
        verifyState.iconBefore = player.icon?.id ?? null;
        verifyState.targetIcon1 = pickRandomIcon([verifyState.iconBefore]);
        verifyState.step = 2;
        renderVerifyStep();
      }catch(e){
        err.textContent = 'Joueur introuvable. Vérifie ton identifiant';
        btn.disabled=false; btn.textContent='Continuer →';
      }
    };
  }

  else if(verifyState.step===2 || verifyState.step===3){
    const n = verifyState.step;
    const targetIcon = n===2 ? verifyState.targetIcon1 : verifyState.targetIcon2;
    card.innerHTML = `
      <div class="step-dots"><span class="on"></span><span class="${n===3?'on':''}"></span><span class="${n===3?'on':''}"></span></div>
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-family:'Fraunces',serif;font-size:1.25rem;font-weight:600;margin-bottom:6px">${n===2?'Change ton icône':'Presque fini !'}</div>
        <div style="font-size:.85rem;color:var(--text2)">Dans Brawl Stars, va dans <strong>Profil → Icône</strong> et équipe :</div>
      </div>
      <div class="icon-box">
        <img src="https://cdn.brawlstats.com/player-thumbnails/${targetIcon}.png" onerror="this.style.display='none'"/>
        <div class="icon-label">Icône à équiper</div>
        <div class="icon-code">#${targetIcon}</div>
      </div>
      <div class="info-box">Ouvre Brawl Stars → Ton profil → Icône de joueur → Équipe l'icône ci-dessus → Reviens ici</div>
      <div class="err-box" id="verify-err"></div>
      <button class="btn-main" id="verify-next">${n===2?"J'ai équipé l'icône":'Valider mon compte'}</button>
      <button class="btn-ghost-sm" id="verify-reroll">Je n'ai pas cette icône</button>`;
    document.getElementById('verify-reroll').onclick = ()=>{
      const newIcon = pickRandomIcon([verifyState.iconBefore, targetIcon]);
      if(n===2) verifyState.targetIcon1 = newIcon; else verifyState.targetIcon2 = newIcon;
      renderVerifyStep();
    };
    document.getElementById('verify-next').onclick = async ()=>{
      const btn = document.getElementById('verify-next');
      const err = document.getElementById('verify-err');
      btn.disabled=true; btn.innerHTML = `<span class="loader"></span>${n===2?'Vérification…':'Finalisation…'}`;
      try{
        const player = await fetchBsPlayer(verifyState.tag);
        if(player.icon?.id === targetIcon){
          if(n===2){
            verifyState.iconBefore = player.icon.id;
            verifyState.targetIcon2 = pickRandomIcon([targetIcon]);
            verifyState.step = 3;
            renderVerifyStep();
          } else {
            identity = {
              tag: verifyState.tag,
              name: player.name,
              clubTag: player.club?.tag || null,
              clubName: player.club?.name || null,
              verified: true,
              verifiedAt: Date.now()
            };
            saveIdentity(identity);
            if(identity.clubTag){
              const clubKey = cleanTag(identity.clubTag);
              update(ref(db, `${CLUB_ROOT}/${clubKey}/members/${cleanTag(identity.tag)}`), {
                name: identity.name, joinedAt: Date.now()
              }).catch(()=>{});
            }
            toast('Compte Brawl Stars vérifié ✅','ok');
            renderMain();
          }
        } else {
          err.textContent = "Icône incorrecte. Vérifie que tu l'as bien équipée dans le jeu.";
          btn.disabled=false; btn.textContent = n===2?"J'ai équipé l'icône":'Valider mon compte';
        }
      }catch(e){
        err.textContent = 'Erreur réseau. Réessaie.';
        btn.disabled=false; btn.textContent = n===2?"J'ai équipé l'icône":'Valider mon compte';
      }
    };
  }
}

/* ══════════════ CHAT DE CLUB ══════════════ */
let clubListening = false;

function openClubScreen(){
  document.getElementById('club-screen').classList.add('open');
  document.getElementById('club-name-lbl').textContent = identity.clubName || 'Mon club';
  document.getElementById('club-sub-lbl').textContent = `Chat privé · ${identity.name}`;
  attachClubListener();
}
function closeClubScreen(){
  document.getElementById('club-screen').classList.remove('open');
}

function attachClubListener(){
  if(clubListening) return;
  clubListening = true;
  const clubKey = cleanTag(identity.clubTag);
  const q = query(ref(db, `${CLUB_ROOT}/${clubKey}/messages`), limitToLast(200));
  onValue(q, (snap)=>{
    const val = snap.val() || {};
    const list = Object.values(val).sort((a,b)=>a.ts-b.ts);
    renderClubMessages(list);
  });
}

function renderClubMessages(list){
  const box = document.getElementById('club-msgs');
  if(list.length===0){
    box.innerHTML = `<div class="club-empty">Aucun message pour l'instant.<br>Sois le premier à écrire à ton club !</div>`;
    return;
  }
  const wasNearBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 40;
  box.innerHTML = list.map(m=>{
    const mine = identity && m.authorTag===identity.tag;
    const time = new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    let content;
    if(m.type==='image'){
      content = `<div class="msg-bubble media"><img src="${m.content}" onclick="window.open('${m.content}','_blank')"/></div>`;
    } else if(m.type==='video'){
      content = `<div class="msg-bubble media"><video src="${m.content}" controls></video></div>`;
    } else {
      content = `<div class="msg-bubble">${escapeHtml(m.content)}</div>`;
    }
    return `<div class="msg-row ${mine?'me':'other'}">
      ${mine?'':`<div class="msg-author">${escapeHtml(m.authorName||'?')}</div>`}
      ${content}
      <div class="msg-time">${time}</div>
    </div>`;
  }).join('');
  if(wasNearBottom) box.scrollTop = box.scrollHeight;
}

async function sendClubText(){
  const inp = document.getElementById('club-text-inp');
  const text = (inp.value||'').trim();
  if(!text || !identity?.clubTag) return;
  inp.value='';
  const clubKey = cleanTag(identity.clubTag);
  try{
    await push(ref(db, `${CLUB_ROOT}/${clubKey}/messages`), {
      authorTag: identity.tag, authorName: identity.name, type:'text', content: text, ts: Date.now()
    });
  }catch(e){ toast('Message non envoyé','err'); }
}

async function sendClubFile(file){
  if(!identity?.clubTag) return;
  const clubKey = cleanTag(identity.clubTag);
  const isVideo = file.type.startsWith('video');
  const prog = document.getElementById('upload-progress');
  prog.style.display='block'; prog.textContent = `Envoi ${isVideo?'de la vidéo':'de la photo'}…`;
  try{
    const path = `${CLUB_ROOT}/${clubKey}/uploads/${Date.now()}_${file.name}`;
    const fileRef = sRef(storage, path);
    await uploadBytes(fileRef, file);
    const url = await getDownloadURL(fileRef);
    await push(ref(db, `${CLUB_ROOT}/${clubKey}/messages`), {
      authorTag: identity.tag, authorName: identity.name, type: isVideo?'video':'image', content: url, ts: Date.now()
    });
  }catch(e){
    toast("Échec de l'envoi. Réessaie.",'err');
  }finally{
    prog.style.display='none';
  }
}

document.getElementById('club-back').addEventListener('click', closeClubScreen);
document.getElementById('club-send-btn').addEventListener('click', sendClubText);
document.getElementById('club-text-inp').addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendClubText(); });
document.getElementById('club-attach-btn').addEventListener('click', ()=>{ document.getElementById('club-file-inp').click(); });
document.getElementById('club-file-inp').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) sendClubFile(file);
  e.target.value='';
});

renderMain();
</script>
